# Git Storage Backend Example

This configuration demonstrates using mackup with git as the storage backend.
Perfect for users who want automatic version control and easy syncing via git.

## Configuration

[storage]
# Use git as the storage engine instead of Dropbox/iCloud/etc
engine = git

# Path to the directory containing your mackup store (relative to home)
path = .dotfiles

# Subdirectory within the path where mackup files are stored
directory = mackup

# Git-specific settings
[git]
# Automatically commit changes after backup operations
auto_commit = true

# Automatically push commits to the remote (be careful with this!)
# Default: false (safer - you control pushes manually)
auto_push = false

# Git remote name to push/pull from
remote = origin

# Git branch to use for commits and pushes
branch = main

# Format string for commit messages
# Supports: {action}, {app_name}, {timestamp}
# Default: "mackup: {action} {app_name}"
commit_message_format = mackup: {action} {app_name} at {timestamp}

## How It Works

1. When you run `mackup backup`, files are copied and automatically committed
2. Commit messages follow your format string
3. With `auto_push = false`, you review and push manually:
   ```bash
   cd ~/.dotfiles/mackup
   git log --oneline  # Review recent commits
   git push origin main
   ```
4. When you run `mackup restore`, it pulls latest changes first
5. Works great with per-machine branches for different configurations

## Tips

- Keep `auto_push = false` for safety, push manually when ready
- Use descriptive commit message formats for easy history review
- Works with GitHub, GitLab, self-hosted git servers
- Perfect for dotfiles repositories alongside mackup
