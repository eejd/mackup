- Sublime Text (variants)

## Usage

```bash
# List all 604 apps (shows which have native sync)
mackup list

# Show details for a specific app (including sync mechanism)
mackup show vscode

# Backup without native-sync apps (default safe behavior)
mackup backup

# Backup everything including native-sync apps
mackup backup --include-native-sync

# Explicitly sync even native-sync apps by listing in config
# (See [applications_to_sync] section above)
```

## When to Use This

### Use Default Filtering (Recommended)
- You trust each app's vendor sync
- Want to avoid symlink conflicts
- Prefer simplicity

### Override with [applications_to_sync]
- You prefer mackup's version control
- Need custom sync timing
- Running multiple machines with different configs

### Use --include-native-sync Flag
- One-time backup including everything
- Testing or experimentation
- Recovering from sync issues
