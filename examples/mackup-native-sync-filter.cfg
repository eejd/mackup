# Native Sync Filtering Example

This configuration demonstrates the native sync filtering feature.
Automatically excludes apps that have their own cloud sync (like VS Code, Spotify).

## Configuration

[storage]
engine = file_system
path = .dotfiles
directory = mackup

# By default (include_native_sync = false), apps with built-in sync are skipped
# This prevents conflicts between mackup and vendor sync mechanisms
[applications_to_sync]
# Explicitly list apps you want to backup even if they have native sync
# (like if you prefer mackup's version control over the app's sync)
vscode
spotify

# If you want ALL apps including those with native sync, set this to true:
# include_native_sync = true

## What Gets Filtered

By default, these 44 apps are skipped due to conflicting native sync:

### Cloud-Native Apps (Vendor Account Sync)
- 1Password
- Spotify
- Telegram (macOS)
- WhatsApp
- Zoom

### IDEs (Settings Sync)
- VS Code & variants (VSCode, Insiders, OSS, Codium)
- Cursor
- Zed
- Windsurf

### JetBrains IDEs
- IntelliJ IDEA
- PyCharm
- WebStorm
- PhpStorm
- RubyMine
- CLion
- GoLand
- DataGrip

### iCloud Sync
- Apple Music
