# Combined Features Example

Use both git storage backend AND native sync filtering together.
This is the ultimate mackup configuration for power users.

## Configuration

[storage]
# Use git backend for version control + native sync filtering
engine = git
path = .dotfiles
directory = mackup

# Git-specific settings
[git]
auto_commit = true
auto_push = false
remote = origin
branch = main
commit_message_format = mackup: {action} {app_name}

# Skip apps with built-in sync (but override specific ones)
# include_native_sync = false (this is the default)

[applications_to_sync]
# Even though Spotify has native sync, back it up with mackup
# (maybe you want version control without touching symlinks)
spotify

# Ignore these apps completely
[applications_to_ignore]
xcode
capture-one

## Workflow

1. **Daily Work**
   ```bash
   # Make config changes in your apps
   mackup backup
   # → Copies new files to ~/.dotfiles/mackup/
   # → Auto-commits with message like "mackup: backup vscode"
   # → Does NOT backup Spotify, VS Code (unless in [applications_to_sync])
   ```

2. **Review Changes**
   ```bash
   cd ~/.dotfiles/mackup
   git log --oneline -10
   git diff HEAD~1
   ```

3. **Push When Ready**
   ```bash
   git push origin main
   # → Syncs to your git remote
   # → Safe because you reviewed first
   ```

4. **On Another Machine**
   ```bash
   git clone <your-repo> ~/.dotfiles
   cd ~/.dotfiles/mackup
   git checkout <your-machine-branch>  # or stay on main
   cd ~
   mackup restore
   # → Pulls latest changes
   # → Restores all configs
   ```

## Benefits of Combined Features

✓ **Version Control** - Full git history of config changes
✓ **Safe Defaults** - Native-sync apps aren't backed up
✓ **Conflict Prevention** - No symlink battles with vendor sync
✓ **Selective Override** - Back up native-sync apps if you want to
✓ **Multi-Machine** - Use git branches for per-machine configs
✓ **Rollback Support** - `git revert` individual commits
✓ **Transparency** - See exactly what changed via `git diff`

## Per-Machine Setup

```bash
# On machine1 (e.g., laptop)
cd ~/.dotfiles/mackup
git checkout -b machine1-configs
# ... customize, make changes ...
mackup backup  # auto-commits
git push origin machine1-configs

# On machine2 (e.g., desktop)  
git checkout machine2-configs
mackup restore
```

Each machine has its own branch, but shared base configs!
